  <style>
    body {
      font-family: Arial, sans-serif;
    }

    /* Full-screen overlay */
    #quiz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* Centered popup */
    .quiz-modal {
      background: #fff;
      padding: 16px 20px;
      border-radius: 8px;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .quiz-modal h2 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      vertical-align: top;
    }

    th {
      background: #f0f0f0;
    }

    .question {
      width: 30%;
    }

    .user-answer input {
      width: 100%;
      box-sizing: border-box;
    }

    .correct-answer {
      font-family: monospace;
    }

    .mistake {
      color: red;
      font-weight: bold;
    }

    .quiz-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .total-mistakes {
      font-weight: bold;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>

  // Ask the user for how many questions they want and start a quiz
  function askForNumQuestions() {
    const max = QUESTIONS.length;
    const input = prompt(`How many questions would you like? (1-${max})`);
    if (input === null) {
      // User cancelled: do nothing, stay on main page
      return;
    }
    const num = parseInt(input, 10);
    if (isNaN(num) || num <= 0) {
      alert("Please enter a positive number.");
      askForNumQuestions();
      return;
    }
    const clamped = Math.min(num, max);
    showQuiz(clamped);
  }

  // Pick a random subset of questions (no repeats)
  function pickRandomQuestions(count) {
    const indices = Array.from(QUESTIONS.keys());
    // Shuffle (Fisher-Yates)
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    const selected = indices.slice(0, count).map(i => QUESTIONS[i]);
    return selected;
  }

  // Escape HTML for text insertion
  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  /**
   * Compute the minimal edit distance and a highlighted version of the
   * correct answer, marking mistakes (subs/deletions) in red.
   *
   * Returns: { highlightedCorrectHtml, distance }
   */
  function diffAnswer(correctRaw, userRaw) {
    const correct = correctRaw.toLowerCase();
    const user = (userRaw || "").toLowerCase();

    const m = correct.length;
    const n = user.length;

    // Levenshtein DP matrix
    const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;

    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        const cost = correct[i - 1] === user[j - 1] ? 0 : 1;
        dp[i][j] = Math.min(
          dp[i - 1][j] + 1,      // deletion
          dp[i][j - 1] + 1,      // insertion
          dp[i - 1][j - 1] + cost // substitution / match
        );
      }
    }

    // Backtrack to figure out which chars in the correct answer are mistaken
    let i = m;
    let j = n;
    const ops = []; // { type: 'equal'|'sub'|'del'|'ins', char: originalCorrectChar }

    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && correct[i - 1] === user[j - 1] &&
          dp[i][j] === dp[i - 1][j - 1]) {
        ops.push({ type: 'equal', char: correctRaw[i - 1] });
        i--; j--;
      } else if (i > 0 && j > 0 && dp[i][j] === dp[i - 1][j - 1] + 1) {
        // substitution
        ops.push({ type: 'sub', char: correctRaw[i - 1] });
        i--; j--;
      } else if (i > 0 && dp[i][j] === dp[i - 1][j] + 1) {
        // deletion (missing char in user)
        ops.push({ type: 'del', char: correctRaw[i - 1] });
        i--;
      } else {
        // insertion (extra char in user)
        // For highlighting the correct answer, there's no char to show,
        // but it still counts as a mistake in the distance.
        ops.push({ type: 'ins', char: "" });
        j--;
      }
    }

    ops.reverse();

    // Build HTML for the correct answer with mistaken chars in red
    let html = "";
    for (const op of ops) {
      const ch = op.char;
      if (!ch) {
        // insertion: extra char in user, nothing to display from the correct word
        continue;
      }
      if (op.type === 'equal') {
        html += escapeHtml(ch);
      } else if (op.type === 'sub' || op.type === 'del') {
        html += `<span class="mistake">${escapeHtml(ch)}</span>`;
      } else {
        // 'ins' here would have ch == "", already skipped above
      }
    }

    const distance = dp[m][n];
    return { highlightedCorrectHtml: html, distance };
  }

  // Show the overlay quiz for `numQuestions`
  function showQuiz(numQuestions) {
    const selected = pickRandomQuestions(numQuestions);

    // Build rows
    const rowsHtml = selected.map((q, idx) => `
      <tr data-index="${idx}">
        <td class="question">${escapeHtml(q.clue)}</td>
        <td class="user-answer">
          <input type="text" data-index="${idx}" autocomplete="off" data-vnkeys/>
        </td>
        <td class="correct-answer"></td>
        <td class="mistake-count"></td>
      </tr>
    `).join("");

    // Build overlay + modal
    const overlay = document.createElement("div");
    overlay.id = "quiz-overlay";

    overlay.innerHTML = `
      <div class="quiz-modal">
        <h2>Spelling Quiz</h2>
        <table>
          <thead>
            <tr>
              <th>Question</th>
              <th>Your Answer</th>
              <th>Real Answer</th>
              <th>Mistakes</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
          </tbody>
        </table>
        <div class="quiz-footer">
          <div class="total-mistakes">Total mistakes: <span id="total-mistakes">0</span></div>
          <button id="quiz-submit">Submit</button>
        </div>
      </div>
    `;

    document.body.appendChild(overlay);

    const submitButton = overlay.querySelector("#quiz-submit");
    const totalMistakesSpan = overlay.querySelector("#total-mistakes");
    const inputs = Array.from(overlay.querySelectorAll("input[data-index]"));
    const tbody = overlay.querySelector("tbody");

    let graded = false;

    submitButton.addEventListener("click", () => {
      if (!graded) {
        // Grade answers
        let total = 0;
        const rows = Array.from(tbody.querySelectorAll("tr[data-index]"));

        rows.forEach(row => {
          const idx = parseInt(row.getAttribute("data-index"), 10);
          const correct = selected[idx].answer;
          const input = row.querySelector('input[data-index]');
          const userAns = input.value;

          const { highlightedCorrectHtml, distance } = diffAnswer(correct, userAns);
          total += distance;

          const correctCell = row.querySelector(".correct-answer");
          const mistakesCell = row.querySelector(".mistake-count");

          correctCell.innerHTML = highlightedCorrectHtml || escapeHtml(correct);
          mistakesCell.textContent = distance.toString();

          input.disabled = true;
        });

        totalMistakesSpan.textContent = total.toString();
        graded = true;
        submitButton.textContent = "OK";
      } else {
        // Dismiss and go back to main game
        overlay.remove();
        askForNumQuestions();
      }
    });

    // Focus first input for convenience
    if (inputs.length > 0) {
      inputs[0].focus();
    }
  }

  // Start by asking for number of questions
  window.addEventListener("load", () => {
    askForNumQuestions();
  });
